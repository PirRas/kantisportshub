<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KANTISPORTS HUB</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  </head>

  <body>
    <main>
      <div class="section" id="profil"></div>
      <div class="section" id="vergleich"></div>
      <div class="section" id="rangliste"></div>
      <div id="profile-container">
        <h1>Profil</h1>

        <div id="profile-form">

          <input id="studentName" type="text" placeholder="Name eingeben" />

          <input id="profileImageInput" type="file" accept="image/*">

          <h2>Grundwerte</h2>

          <input id="endurance" type="number" min="0" max="100" placeholder="Ausdauer 0 bis 100" />

          <input id="strength" type="number" min="0" max="100" placeholder="Kraft 0 bis 100" />

          <input id="speed" type="number" min="0" max="100" placeholder="Schnelligkeit 0 bis 100" />

          <input id="coordination" type="number" min="0" max="100" placeholder="Koordination 0 bis 100" />

          <button id="saveProfileBtn" type="button">Speichern</button>

        </div>

        <hr />

        <div id="profile-output">

          <h2>Gespeicherte Werte</h2>

          <img id="profileImagePreview" width="120">

          <p id="outputText">Noch keine Daten gespeichert</p>

          <p id="overallText">Gesamtwert: -</p>

        </div>

        <hr />

        <!-- Bereich für Vergleich von zwei Benutzern -->
        <div id="compare-section">
          <h2>Vergleich</h2>

          <!-- Auswahl von zwei Benutzern -->
          <select id="compareUser1"></select>
          <select id="compareUser2"></select>

          <!-- Startet Vergleich -->
          <button id="compareBtn" type="button">Vergleichen</button>

          <!-- Ergebnis wird hier angezeigt -->
          <div id="compareOutput"></div>
        </div>

        <hr />

        <div id="ranking-section">
          <h2>Rangliste</h2>

          <select id="roleFilter">
            <option value="Alle">Alle</option>
            <option value="Schüler">Schüler</option>
            <option value="Lehrperson">Lehrperson</option>
          </select>

          <button id="loadRankingBtn" type="button">Rangliste laden</button>

          <div id="rankingOutput"></div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
